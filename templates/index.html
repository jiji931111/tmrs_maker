<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMRS Pattern Maker</title>
    <meta name="description" content="반도체 테스트 장비용 TMRS 패턴 파일 생성 도구">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="app-header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">⚡</div>
                <div class="logo-text">
                    <h1>TMRS Pattern Maker</h1>
                    <span class="version">v2.0</span>
                </div>
            </div>
            <div class="header-nav">
                <span class="status-badge" id="statusBadge">대기 중</span>
            </div>
        </div>
    </header>

    <main class="app-main">
        <!-- STEP 1: Data Input -->
        <section class="card" id="uploadSection">
            <div class="card-header">
                <div class="card-header-left">
                    <span class="step-num">01</span>
                    <h2>데이터 입력</h2>
                </div>
            </div>
            <div class="card-body">
                <div class="input-tabs">
                    <button class="tab-btn active" id="tabFile" data-mode="file">파일 업로드</button>
                    <button class="tab-btn" id="tabPaste" data-mode="paste">붙여넣기</button>
                </div>

                <div class="upload-layout">
                    <!-- File upload mode -->
                    <div class="upload-left" id="fileMode">
                        <div class="dropzone" id="dropzone">
                            <div class="dropzone-content">
                                <div class="dropzone-icon">📂</div>
                                <p class="dropzone-text">엑셀 파일을 드래그하거나 클릭</p>
                                <p class="dropzone-hint">.xlsx, .xls 지원 · A열: HEX 코드 · B열: 이름</p>
                            </div>
                            <input type="file" id="fileInput" accept=".xlsx,.xls" hidden>
                        </div>
                        <div class="upload-info" id="uploadInfo" style="display:none">
                            <span class="file-icon">📄</span>
                            <span id="fileName"></span>
                            <span class="badge" id="fileCount"></span>
                            <button class="btn btn-xs btn-ghost" id="clearFileBtn" title="제거">✕</button>
                        </div>
                    </div>

                    <!-- Paste mode (hidden by default) -->
                    <div class="upload-left" id="pasteMode" style="display:none">
                        <div class="paste-area">
                            <label>엑셀에서 A열(코드)·B열(이름) 범위를 복사 후 아래에 붙여넣기</label>
                            <textarea id="pasteInput" rows="6" spellcheck="false"
                                placeholder="000&#9;default&#10;001&#9;test_1&#10;A8C&#9;test_2"></textarea>
                            <div class="paste-actions">
                                <button class="btn btn-primary btn-sm" id="parsePasteBtn">데이터 적용</button>
                                <button class="btn btn-ghost btn-sm" id="clearPasteBtn">지우기</button>
                                <span class="paste-hint">탭으로 코드·이름 구분 · 줄바꿈으로 항목 구분</span>
                            </div>
                        </div>
                    </div>

                    <!-- Data preview (shared) -->
                    <div class="upload-right" id="dataPreview" style="display:none">
                        <h3>데이터 미리보기 <small id="previewHint"></small></h3>
                        <div class="table-wrap">
                            <table>
                                <thead><tr><th>#</th><th>HEX</th><th>이름</th></tr></thead>
                                <tbody id="previewBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- STEP 2 + 3: Template & Preview (side by side) -->
        <div class="split-panel" id="splitPanel">
            <!-- Left: Template Settings -->
            <section class="card" id="templateSection">
                <div class="card-header">
                    <div class="card-header-left">
                        <span class="step-num">02</span>
                        <h2>변환 템플릿 설정</h2>
                    </div>
                </div>
                <div class="card-body">
                    <div class="tmpl-toolbar">
                        <button class="btn btn-ghost btn-sm" id="addFolderBtn" title="`/`를 사용해 하위 폴더도 생성 가능 (예: 그룹/서브)">📁 새 폴더</button>
                        <button class="btn btn-ghost btn-sm" id="expandAllBtn" title="모두 펼치기">▾ 모두 펼치기</button>
                        <button class="btn btn-ghost btn-sm" id="collapseAllBtn" title="모두 접기">▸ 모두 접기</button>
                    </div>
                    <div class="tmpl-filter-wrap">
                        <input type="text" id="tagFilter" placeholder="🔍 태그 검색 (쉼표로 여러 태그 검색 가능)">
                    </div>
                    <div id="templateTree" class="template-tree"></div>
                    <button class="btn btn-outline btn-add" id="addTemplateBtn">
                        ＋ 새 템플릿 추가
                    </button>

                    <div class="template-editor" id="templateEditor" style="display:none">
                        <div class="editor-header">
                            <h3 id="editorTitle">템플릿 편집</h3>
                            <button class="btn btn-xs btn-ghost" id="closeEditorBtn">✕</button>
                        </div>
                        <div class="editor-body">
                            <div class="form-row">
                                <div class="form-group flex1">
                                    <label>템플릿 이름</label>
                                    <input type="text" id="tmplName" placeholder="예: 기본 템플릿">
                                </div>
                                <div class="form-group flex1">
                                    <label>폴더</label>
                                    <div class="folder-select-wrap">
                                        <select id="tmplFolder" class="folder-select">
                                            <option value="">(루트)</option>
                                        </select>
                                        <input type="text" id="tmplFolderNew" class="folder-new-input" placeholder="새 폴더 이름" style="display:none">
                                        <button class="btn btn-xs btn-ghost" id="tmplFolderToggle" title="새 폴더 직접 입력">✚</button>
                                    </div>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group flex1">
                                    <label>파일명 패턴</label>
                                    <input type="text" id="tmplFilePattern" placeholder="TMRS%(code)s.asc">
                                    <div class="var-chips-inline" id="filePatternChips"></div>
                                </div>
                                <div class="form-group flex1">
                                    <label>태그 (선택)</label>
                                    <input type="text" id="tmplTags" placeholder="쉼표로 구분 (예: HBM, 테스트)">
                                </div>
                            </div>

                            <!-- Variable Panel -->
                            <div class="var-panel">
                                <div class="var-panel-title">
                                    사용 가능한 변수
                                    <span class="hint">클릭하면 커서 위치에 삽입됩니다. 드래그도 가능합니다.</span>
                                </div>
                                <div class="var-chips" id="varChips">
                                    <!-- Populated by JS -->
                                </div>
                            </div>

                            <div class="form-group">
                                <label>템플릿 내용</label>
                                <textarea id="tmplBody" rows="12" spellcheck="false" placeholder="파일 내용을 입력하세요..."></textarea>
                            </div>

                            <div class="matrix-section">
                                <div class="matrix-header">
                                    <h4>변환 매트릭스</h4>
                                    <label class="toggle">
                                        <input type="checkbox" id="useSameMatrix" checked>
                                        <span class="toggle-track"><span class="toggle-knob"></span></span>
                                        <span>전체 동일 매핑</span>
                                    </label>
                                </div>
                                <div id="matrixContainer"></div>
                            </div>
                            <div class="editor-actions">
                                <button class="btn btn-primary" id="saveTemplateBtn">저장</button>
                                <button class="btn btn-ghost" id="cancelEditorBtn">취소</button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Resize Divider -->
            <div class="split-divider" id="splitDivider" title="드래그하여 패널 크기 조절">
                <div class="divider-handle"></div>
            </div>

            <!-- Right: Preview & Generate -->
            <section class="card preview-panel" id="generateSection">
                <div class="card-header">
                    <div class="card-header-left">
                        <span class="step-num">03</span>
                        <h2>미리보기 & 생성</h2>
                    </div>
                    <div class="live-indicator" id="liveIndicator" style="display:none">
                        <span class="live-dot"></span>
                        실시간
                    </div>
                </div>
                <div class="card-body">
                    <div class="gen-actions">
                        <div class="gen-name-input" id="genNameGroup">
                            <label for="inputNameField">출력 이름</label>
                            <input type="text" id="inputNameField" placeholder="예: JH" spellcheck="false">
                        </div>
                        <div class="gen-buttons">
                            <button class="btn btn-secondary" id="previewBtn" disabled>미리보기</button>
                            <button class="btn btn-primary" id="generateBtn" disabled>파일 생성 & 다운로드</button>
                        </div>
                    </div>
                    <div id="outputPreview">
                        <div class="preview-empty" id="previewEmpty">
                            <div class="preview-empty-icon">📄</div>
                            <p>데이터와 템플릿을 선택하면<br>여기에 미리보기가 표시됩니다</p>
                        </div>
                        <div id="previewCards"></div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <div class="toast-container" id="toastContainer"></div>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
