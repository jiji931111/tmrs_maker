<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMRS Pattern Maker</title>
    <meta name="description" content="반도체 테스트 장비용 TMRS 패턴 파일 생성 도구">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="app-header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">⚡</div>
                <div class="logo-text">
                    <h1>TMRS Pattern Maker</h1>
                    <span class="version">v1.0</span>
                </div>
            </div>
            <div class="header-right">
                <span class="status-badge" id="statusBadge">대기 중</span>
            </div>
        </div>
    </header>

    <main class="app-main">
        <!-- STEP 1: Upload -->
        <section class="card" id="uploadSection">
            <div class="card-header">
                <span class="step-badge">1</span>
                <h2>엑셀 파일 업로드</h2>
            </div>
            <div class="card-body upload-layout">
                <div class="upload-left">
                    <div class="dropzone" id="dropzone">
                        <div class="dropzone-content">
                            <div class="dropzone-icon">📂</div>
                            <p class="dropzone-text">엑셀 파일을 드래그하거나 클릭</p>
                            <p class="dropzone-hint">.xlsx 지원 · A열: HEX 코드 · B열: 이름</p>
                        </div>
                        <input type="file" id="fileInput" accept=".xlsx,.xls" hidden>
                    </div>
                    <div class="upload-info" id="uploadInfo" style="display:none">
                        <span class="file-icon">📄</span>
                        <span id="fileName"></span>
                        <span class="badge" id="fileCount"></span>
                        <button class="btn btn-xs btn-ghost" id="clearFileBtn" title="제거">✕</button>
                    </div>
                </div>
                <div class="upload-right" id="dataPreview" style="display:none">
                    <h3>미리보기 <small id="previewHint"></small></h3>
                    <div class="table-wrap">
                        <table>
                            <thead><tr><th>#</th><th>HEX</th><th>이름</th></tr></thead>
                            <tbody id="previewBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>

        <!-- STEP 2: Templates -->
        <section class="card" id="templateSection">
            <div class="card-header">
                <span class="step-badge">2</span>
                <h2>변환 템플릿 설정</h2>
            </div>
            <div class="card-body">
                <div id="templateList" class="template-list"></div>
                <button class="btn btn-outline btn-add" id="addTemplateBtn">
                    <span>＋</span> 새 템플릿 추가
                </button>

                <div class="template-editor" id="templateEditor" style="display:none">
                    <div class="editor-header">
                        <h3 id="editorTitle">템플릿 편집</h3>
                        <button class="btn btn-xs btn-ghost" id="closeEditorBtn">✕</button>
                    </div>
                    <div class="editor-body">
                        <div class="form-row">
                            <div class="form-group flex1">
                                <label>템플릿 이름</label>
                                <input type="text" id="tmplName" placeholder="예: 기본 템플릿">
                            </div>
                            <div class="form-group flex1">
                                <label>파일명 패턴 <span class="info-tip" title="%(code)s %(tmrs_name)s %(val1)s %(val2)s %(val3)s 사용 가능">ⓘ</span></label>
                                <input type="text" id="tmplFilePattern" placeholder="TMRS%(code)s.asc">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>템플릿 내용 <span class="info-tip" title="%(filename_code)s=전체코드 %(tmrs_name)s=이름 %(val1)s %(val2)s %(val3)s=변환값">ⓘ</span></label>
                            <div class="placeholder-hints">
                                <code>%(filename_code)s</code><code>%(tmrs_name)s</code>
                                <code>%(val1)s</code><code>%(val2)s</code><code>%(val3)s</code><code>%(code)s</code>
                            </div>
                            <textarea id="tmplBody" rows="8" spellcheck="false" placeholder="파일 내용을 입력하세요..."></textarea>
                        </div>
                        <div class="matrix-section">
                            <div class="matrix-header">
                                <h4>변환 매트릭스</h4>
                                <label class="toggle">
                                    <input type="checkbox" id="useSameMatrix" checked>
                                    <span class="toggle-track"><span class="toggle-knob"></span></span>
                                    <span>전체 동일 매핑</span>
                                </label>
                            </div>
                            <div id="matrixContainer"></div>
                        </div>
                        <div class="editor-actions">
                            <button class="btn btn-primary" id="saveTemplateBtn">💾 저장</button>
                            <button class="btn btn-ghost" id="cancelEditorBtn">취소</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- STEP 3: Generate -->
        <section class="card" id="generateSection">
            <div class="card-header">
                <span class="step-badge">3</span>
                <h2>미리보기 & 생성</h2>
            </div>
            <div class="card-body">
                <div class="gen-actions">
                    <button class="btn btn-secondary" id="previewBtn" disabled>👁 미리보기</button>
                    <button class="btn btn-primary btn-glow" id="generateBtn" disabled>🚀 파일 생성 & 다운로드</button>
                </div>
                <div id="outputPreview" style="display:none">
                    <div id="previewCards"></div>
                </div>
            </div>
        </section>
    </main>

    <div class="toast-container" id="toastContainer"></div>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
